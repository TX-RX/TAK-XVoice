# CodeQL static analysis for TAK-XVoice.
#
# NOTE — this workflow is a limited-fidelity scan. XV's Kotlin
# sources import ATAK CIV SDK types that live outside the repo (see
# `app/libs/main.jar` gitignore + `ci.yml` for the licensing rationale),
# so CodeQL cannot fully compile our code in public CI. We use
# `build-mode: none`, which does a source-only extraction that:
#   * still runs CodeQL's Kotlin queries against parseable code
#   * misses queries that require full type resolution against ATAK
#
# See CLAUDE.md for context on why the SDK isn't in CI.

name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly baseline scan so we pick up new CodeQL queries against
    # the current tree even if the tree hasn't changed. Fires Monday
    # 06:17 UTC — off-peak, non-round to avoid contention.
    - cron: '17 6 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Query suites: default is "security-extended" which enables
          # additional queries beyond the standard security set.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
