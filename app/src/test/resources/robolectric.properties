# Robolectric runtime configuration for XV unit tests.
#
# sdk: pin to API 33 to match our targetSdk in app/build.gradle.kts.
# Robolectric ships shadows up through the SDK level you ask for; pinning
# keeps test runs reproducible across Robolectric jar updates.
#
# instrumentedPackages: empty by default — XV's unit tests don't need
# class-level instrumentation (no bytecode rewriting of XV code) because
# the design uses constructor injection for everything Android-touching.
# Tests pass in fakes/mocks via the public constructor.
sdk=33
